services:
  postgres:
    image: postgres:16-alpine
    container_name: ticketer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-app_user}
      POSTGRES_PASSWORD: ${PGPASSWORD:?PGPASSWORD must be set in .env}
      POSTGRES_DB: ${PGDATABASE:-app_db}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-app_user} -d ${PGDATABASE:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ticketer

  redis:
    image: redis:7-alpine
    container_name: ticketer-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ticketer

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketer-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      TECHNICIAN_PASSWORD: ${TECHNICIAN_PASSWORD:-tech123}
      REPORTER_PASSWORD: ${REPORTER_PASSWORD:-reporter123}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-}
      EMAIL_FROM: ${EMAIL_FROM:-IT Ticketer <noreply@example.com>}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-smtp-relay.brevo.com}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-587}
      BREVO_SMTP_LOGIN: ${BREVO_SMTP_LOGIN:-}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY:-}
      # PostgreSQL connection — backend connects to the postgres service by hostname
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${PGDATABASE:-app_db}
      PGUSER: ${PGUSER:-app_user}
      PGPASSWORD: ${PGPASSWORD:?PGPASSWORD must be set in .env}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      # Redis connection — backend connects to the redis service by hostname
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "3000:3000"
    networks:
      - ticketer

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketer-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - ticketer

networks:
  ticketer:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

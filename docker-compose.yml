services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketer-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      TECHNICIAN_PASSWORD: ${TECHNICIAN_PASSWORD:-tech123}
      REPORTER_PASSWORD: ${REPORTER_PASSWORD:-reporter123}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-}
      EMAIL_FROM: ${EMAIL_FROM:-IT Ticketer <noreply@example.com>}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-smtp-relay.brevo.com}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-587}
      BREVO_SMTP_LOGIN: ${BREVO_SMTP_LOGIN:-}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - ticketer

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketer-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - ticketer

networks:
  ticketer:
    driver: bridge

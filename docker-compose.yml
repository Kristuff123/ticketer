services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketer-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "3000:3000"
    networks:
      - ticketer

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketer-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - ticketer

networks:
  ticketer:
    driver: bridge
